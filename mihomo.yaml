rules:
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,100.64.0.0/10,DIRECT
  - DOMAIN-SUFFIX,msftconnecttest.com,DIRECT
  - DOMAIN-SUFFIX,msftncsi.com,DIRECT
  - DOMAIN-SUFFIX,ts.net,DIRECT
  - DOMAIN-SUFFIX,localhost,DIRECT
  - DOMAIN-SUFFIX,googleapis.cn,рЯЪА иКВзВєйАЙжЛ©
  - RULE-SET,geosite-category-games,рЯОЃ жЄЄжИП
  - RULE-SET,nvidia,DIRECT
  - RULE-SET,steam,рЯОЃ жЄЄжИП
  - RULE-SET,xbox,рЯОЃ жЄЄжИП
  - RULE-SET,ea,рЯОЃ жЄЄжИП
  - RULE-SET,epicgames,рЯОЃ жЄЄжИП
  - RULE-SET,geosite-category-ads-all,REJECT
  - RULE-SET,geosite-cn,DIRECT
  - RULE-SET,geoip-cn,DIRECT
  - RULE-SET,geosite-geolocation-!cn,рЯЪА иКВзВєйАЙжЛ©
  - MATCH,рЯЪА иКВзВєйАЙжЛ©

